    enum:
    - HOSPITAL_COMPANION
    - ELDERLY_CAREGIVER
    - NURSE
    - PHYSIOTHERAPIST
    type: string
    x-enum-varnames:
    - HospitalCompanion
    - ElderlyCaregiver
    - Nurse
    - Physiotherapist
  domain.Role:
    enum:
    - CLIENT
    - PROFESSIONAL
    - ADMIN
    type: string
