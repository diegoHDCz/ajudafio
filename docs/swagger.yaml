        type: string
      number:
        type: string
      reference:
        type: string
      state:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      zip_code:
        type: string
    type: object
  http.availabilityResponse:
    properties:
      day_of_week:
        items:
          $ref: '#/definitions/shared.WeekDay'
        type: array
      end_hour:
        type: string
      id:
        type: string
      professional_id:
        type: string
      shift:
        items:
          $ref: '#/definitions/shared.Shift'
        type: array
      start_hour:
        type: string
    type: object
  http.contractResponse:
    properties:
      client_id:
        type: string
      created_at:
        type: string
      details:
        type: object
      hour_rate:
        type: integer
      hours_per_day:
        type: integer
      id:
        type: string
      professional_id:
        type: string
      shift:
        type: string
      start_time:
        type: string
      status:
        type: string
      total_amount:
        type: integer
      total_hours:
        type: integer
      week_days:
        items:
          type: string
        type: array
