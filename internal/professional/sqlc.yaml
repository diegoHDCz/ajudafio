# internal/professional/sqlc.yaml
version: "2"
sql:
  - engine: "postgresql"
    queries: "adapters/postgres/queries"
    schema: "../../migrations"
    gen:
      go:
        package: "professionalpostgres"
        out: "adapters/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - go_type: "github.com/lib/pq.StringArray"
            postgres_type: "_text"
