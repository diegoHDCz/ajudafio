# internal/auth/sqlc.yaml
version: "2"
sql:
  - engine: "postgresql"
    queries: "adapters/postgres/queries"
    schema: "../../migrations"
    gen:
      go:
        package: "authpostgres"
        out: "adapters/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
