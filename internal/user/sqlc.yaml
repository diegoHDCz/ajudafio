# internal/user/sqlc.yaml
version: "2"
sql:
  - engine: "postgresql"
    queries: "adapters/postgres/queries"
    schema: "../../migrations"
    gen:
      go:
        package: "userpostgres"
        out: "adapters/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            # Ajustado para o caminho interno correto:
            go_type: "github.com/diegoHDCz/ajudafio/internal/user/domain.UserID"
